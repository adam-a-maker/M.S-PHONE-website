<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infos — M.S PHONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030303;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }
    .back {
      align-self: flex-start;
      margin-bottom: 40px;
      color: #a1a1aa;
      text-decoration: none;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
    }
    .back:hover { color: #8b5cf6; }
    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 48px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .card__brand {
      font-family: 'Instrument Serif', serif;
      font-size: 2.5rem;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 4px;
    }
    .card__slogan {
      font-size: 0.9rem;
      color: #71717a;
      margin-bottom: 32px;
    }
    .card__item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.95rem;
      color: #d4d4d8;
      text-decoration: none;
      transition: color 0.3s;
    }
    .card__item:last-of-type { border-bottom: none; }
    .card__item:hover { color: #8b5cf6; }
    .card__item svg { flex-shrink: 0; opacity: 0.5; }
    .card__item a { color: inherit; text-decoration: none; }
    .hours {
      border-top: 1px solid rgba(255,255,255,0.04);
      margin-top: 16px;
      padding-top: 20px;
    }
    .hours__title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8b5cf6;
      margin-bottom: 12px;
    }
    .hours__row {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 0.85rem;
      color: #a1a1aa;
      padding: 4px 0;
    }
    .hours__row span:first-child { color: #d4d4d8; min-width: 100px; text-align: right; }
    .hours__row span:last-child { min-width: 120px; text-align: left; }
    .map-wrap {
      margin-top: 32px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .map-wrap iframe {
      display: block;
      width: 100%;
      height: 300px;
      border: none;
    }
    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .hours__row { flex-direction: column; align-items: center; gap: 2px; }
      .hours__row span:first-child { text-align: center; }
      .hours__row span:last-child { text-align: center; }
      .map-wrap iframe { height: 220px; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Retour à l'accueil
  </a>

  <div class="card">
    <div class="card__brand">M.S PHONE</div>
    <p class="card__slogan">Spécialiste réparation téléphone & ordinateur</p>

    <a href="https://www.google.com/maps/dir//21+Boulevard+Barbes+75018+Paris" target="_blank" rel="noopener" class="card__item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      21 Boulevard Barbes, 75018 Paris
    </a>

    <a href="tel:0142576568" class="card__item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      01 42 57 65 68
    </a>

    <a href="mailto:contact@msphone.fr" class="card__item">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      contact@msphone.fr
    </a>

    <div class="hours">
      <div class="hours__title">Horaires d'ouverture</div>
      <div class="hours__row"><span>Lun — Ven</span><span>09h30 – 20h00</span></div>
      <div class="hours__row"><span>Samedi</span><span>09h30 – 20h00</span></div>
      <div class="hours__row"><span>Dimanche</span><span>10h30 – 19h30</span></div>
    </div>

    <div class="map-wrap">
      <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d10499.5!2d2.3503!3d48.884!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66f1f2f2f2f2f%3A0x0!2s21%20Boulevard%20Barbes%2C%2075018%20Paris!5e0!3m2!1sfr!2sfr!4v1!5m2!1sfr!2sfr" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>
</body>
</html>
